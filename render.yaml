services:
  # Python Data Processing Microservice
  - type: web
    name: datadash-python
    runtime: python
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir src
    envVars:
      - key: UPLOAD_DIR
        value: /tmp/uploads
    disk:
      name: python-uploads
      mountPath: /tmp/uploads
      sizeGB: 1

  # Node.js Backend API
  - type: web
    name: datadash-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: datadash-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: PYTHON_SERVICE_URL
        fromService:
          name: datadash-python
          type: web
          property: host
      - key: STORAGE_TYPE
        value: local
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE
        value: "52428800"
      - key: FRONTEND_URL
        fromService:
          name: datadash-frontend
          type: web
          property: host
    disk:
      name: backend-uploads
      mountPath: /tmp/uploads
      sizeGB: 1

  # React Frontend (Static Site)
  - type: web
    name: datadash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://datadash-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: datadash-db
    databaseName: datadash
    user: datadash
    plan: free
